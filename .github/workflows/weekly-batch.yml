name: 週末バッチ生成（土日 自動20記事）

on:
  schedule:
    - cron: '0 23 * * 5'   # 土曜 8:00 JST（UTC 金曜23:00）
    - cron: '0 23 * * 6'   # 日曜 8:00 JST（UTC 土曜23:00）
  workflow_dispatch:
    inputs:
      article_count:
        description: '生成する記事数'
        required: false
        default: '20'
        type: string

jobs:
  weekly-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 150  # quota待機60分 + 生成90分
    concurrency:
      group: batch-generation
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Node.js セットアップ
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: パッケージインストール
        run: |
          npm ci || npm install
        timeout-minutes: 5

      - name: OpenAI API Key チェック
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "Error: OPENAI_API_KEY is not set"
            exit 1
          fi

      - name: 週末バッチ生成（quota対応リトライ付き）
        id: batch_generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARTICLE_COUNT=${{ github.event.inputs.article_count || '20' }}
          echo "📝 生成する記事数: $ARTICLE_COUNT"

          node scripts/generate-batch.js $ARTICLE_COUNT
          EXITCODE=$?

          if [ $EXITCODE -eq 2 ]; then
            echo "⏳ APIクォータ超過。60分待機後にリトライします..."
            sleep 3600
            node scripts/generate-batch.js $ARTICLE_COUNT
          elif [ $EXITCODE -ne 0 ]; then
            echo "バッチ生成に失敗しました。30秒後にリトライします..."
            sleep 30
            node scripts/generate-batch.js $ARTICLE_COUNT
          fi
        timeout-minutes: 140

      - name: サイトマップ生成
        if: success()
        run: |
          node scripts/generate-sitemap.js || echo "サイトマップ生成に失敗しましたが続行します"

      - name: 変更をコミット
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git fetch origin main
          git pull origin main --rebase || {
            echo "Pull failed, trying to merge"
            git rebase --abort 2>/dev/null || true
            git pull origin main --no-rebase
          }

          git add -A

          if ! git diff --quiet || ! git diff --staged --quiet; then
            ARTICLE_COUNT=${{ github.event.inputs.article_count || '20' }}
            git commit -m "🚀 週末バッチ: ${ARTICLE_COUNT}記事を追加 ($(date +'%Y-%m-%d' -d '+9 hours'))"
          else
            echo "変更がないためコミットをスキップします"
          fi

      - name: プッシュ
        if: success()
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          force: false

      - name: 実行サマリー
        if: always()
        run: |
          echo "## 🚀 週末バッチ生成 結果" >> $GITHUB_STEP_SUMMARY
          echo "- 実行日時: $(date +'%Y-%m-%d %H:%M JST' -d '+9 hours')" >> $GITHUB_STEP_SUMMARY
          echo "- 記事数: ${{ github.event.inputs.article_count || '20' }}記事" >> $GITHUB_STEP_SUMMARY
          echo "- ステータス: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: ワークフロー失敗時の通知
        if: failure()
        run: |
          echo "::error::週末バッチ生成ワークフローが失敗しました"
          echo "失敗したステップ: ${{ steps.batch_generate.outcome }}"
